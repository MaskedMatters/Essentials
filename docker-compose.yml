services:
  mongodb:
    image: mongo:7.0
    container_name: essentials-mongodb
    restart: always
    volumes:
      - ./mongodb_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - essentials

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: essentials-backend
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./volumes:/volumes
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017/essentials
      - JWT_SECRET=super_secret_jwt_key_for_dev
      - VOLUMES_HOST_PATH=${PWD}/volumes
      - VOLUMES_CONTAINER_PATH=/volumes
      - CHROME_IMAGE=lscr.io/linuxserver/chromium:latest
      - DOCKER_NETWORK=essentials
    networks:
      - essentials

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: essentials-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - essentials
networks:
  essentials:
    driver: bridge
    name: essentials
